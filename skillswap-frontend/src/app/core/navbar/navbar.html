<nav class="navbar">
  <div class="navbar-container">
    <!-- Logo -->
    <a class="navbar-brand" routerLink="/">
      <span class="brand-icon">⚡</span>
      <span class="brand-name">Skill<span class="brand-accent">Swap</span></span>
    </a>

    <!-- Desktop Nav Links -->
    <ul class="navbar-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Find Jobs</a></li>
      <li><a routerLink="/jobs/create" routerLinkActive="active">Post a Job</a></li>
    </ul>

    <!-- Desktop Auth Buttons -->
    <div class="navbar-auth">
      <a routerLink="/login" class="btn-nav btn-nav-outline">Log in</a>
      <a routerLink="/register" class="btn-nav btn-nav-primary">Sign up</a>
    </div>

    <!-- Hamburger (mobile) -->
    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.visible]="menuOpen()">
    <a routerLink="/" (click)="menuOpen.set(false)">Find Jobs</a>
    <a routerLink="/jobs/create" (click)="menuOpen.set(false)">Post a Job</a>
    <div class="mobile-divider"></div>
    <a routerLink="/login" (click)="menuOpen.set(false)">Log in</a>
    <a routerLink="/register" class="mobile-signup" (click)="menuOpen.set(false)">Sign up</a>
  </div>
</nav>
