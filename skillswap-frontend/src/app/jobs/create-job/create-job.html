<section class="create-job">
  <h2>Post a New Job</h2>
  <p class="subtitle">Find the perfect freelancer for your project</p>

  <div *ngIf="errorMessage" class="alert error">
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="onSubmit()" #jobForm="ngForm">
    <div class="form-group">
      <label for="title">Job Title</label>
      <input
        type="text"
        id="title"
        name="title"
        [(ngModel)]="jobData.title"
        required
        #title="ngModel"
        placeholder="e.g., Need a React developer for e-commerce site"
      />
      <div *ngIf="title.invalid && title.touched" class="error-message">
        Title is required
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        name="description"
        rows="6"
        [(ngModel)]="jobData.description"
        required
        #description="ngModel"
        placeholder="Describe the project in detail..."></textarea>
      <div *ngIf="description.invalid && description.touched" class="error-message">
        Description is required
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="budget">Budget ($)</label>
        <input
          type="number"
          id="budget"
          name="budget"
          [(ngModel)]="jobData.budget"
          required
          min="1"
          #budget="ngModel"
          placeholder="e.g., 500"
        />
        <div *ngIf="budget.invalid && budget.touched" class="error-message">
          Valid budget is required
        </div>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select
          id="category"
          name="category"
          [(ngModel)]="jobData.category"
          required
          #category="ngModel">
          <option value="" disabled selected>Select a category</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
        <div *ngIf="category.invalid && category.touched" class="error-message">
          Category is required
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" routerLink="/jobs/my-postings">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="jobForm.invalid || loading">
        {{ loading ? 'Posting...' : 'Post Job' }}
      </button>
    </div>
  </form>
</section>
